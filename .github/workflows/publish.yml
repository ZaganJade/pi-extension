name: Publish Packages

# Publish workspaces (@zaganjade/pi-usage, @zaganjade/pi-multi-skill, @zaganjade/pi-context)
# to npm AND GitHub Packages. Skips versions already on the registry.
#
# Triggers:
#   - Manual:  Actions tab → "Run workflow"
#   - Release: publish when a GitHub Release is published
#
# Secrets required (Settings → Secrets and variables → Actions):
#   NPM_TOKEN        → npm automation/access token (https://www.npmjs.com/settings/zaganjade/tokens)
#                      (granular or classic, needs "Publish" / Automation)
#   GITHUB_TOKEN     → auto-provided by Actions (no setup needed)

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish changed workspace versions
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          for ws in usage multi-skill Pi-Context; do
            name=$(node -p "require('./${ws}/package.json').name")
            ver=$(node -p "require('./${ws}/package.json').version")
            published=$(npm view "${name}" version 2>/dev/null || true)
            if [ "${published}" = "${ver}" ]; then
              echo "Skip ${name}@${ver} (already on npm)"
              continue
            fi
            echo "Publishing ${name}@${ver} to npm"
            npm publish --workspace "${ws}" --access public
          done

  publish-gpr:
    name: Publish to GitHub Packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'

      - name: Publish changed workspace versions
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          for ws in usage multi-skill Pi-Context; do
            name=$(node -p "require('./${ws}/package.json').name")
            ver=$(node -p "require('./${ws}/package.json').version")
            published=$(npm view "${name}" version --registry=https://npm.pkg.github.com 2>/dev/null || true)
            if [ "${published}" = "${ver}" ]; then
              echo "Skip ${name}@${ver} (already on GPR)"
              continue
            fi
            echo "Publishing ${name}@${ver} to GitHub Packages"
            npm publish --workspace "${ws}"
          done
